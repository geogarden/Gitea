# ─── PRZEŁĄCZNIKI (R/W – aktywacja/dezaktywacja) ─────────────────────────────
# Logika Write → Verify (wg https://github.com/jrx-code/hassio-integration-wanas):
#   Stan odczytywany jest z rejestru statusowego (verify_register),
#   a zapis idzie do rejestru sterującego (address).
#   Dla Bypass/Nawilżacza wartość ON = 1, dla pozostałych – wartość max czasu.

switch:
  # Rejestr 38 – GWC (zapis 38 → weryfikacja reg.30)
  # ON=1 / OFF=0
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "GWC"
    register_type: holding
    address: 38
    bitmask: 0x1

  # Rejestr 39 – Bypass (zapis 39 → weryfikacja reg.31)
  # ON=1 / OFF=0
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Bypass"
    register_type: holding
    address: 39
    bitmask: 0x1

  # Rejestr 40 – Nawilżacz (zapis 40 → weryfikacja reg.32)
  # ON=1 / OFF=0
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Nawilżacz"
    register_type: holding
    address: 40
    bitmask: 0x1

  # Rejestr 41 – Nagrzewnica (zapis 41 → weryfikacja reg.33)
  # ON=1 (aktywacja na max 60 dni) / OFF=0
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Nagrzewnica"
    register_type: holding
    address: 41
    write_lambda: |-
      if (x) {
        payload = {0x00, 0x01};  // ON: aktywuj (1 dzień)
      } else {
        payload = {0x00, 0x00};  // OFF: dezaktywuj
      }
      return true;
    lambda: |-
      // Stan odczytuj z rejestru 33 (Nagrzewnica aktywna)
      return data[item->offset] << 8 | data[item->offset + 1];

  # Rejestr 42 – Chłodnica (zapis 42 → weryfikacja reg.34)
  # ON=1 (aktywacja na max 60 dni) / OFF=0
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Chłodnica"
    register_type: holding
    address: 42
    write_lambda: |-
      if (x) {
        payload = {0x00, 0x01};  // ON: aktywuj (1 dzień)
      } else {
        payload = {0x00, 0x00};  // OFF: dezaktywuj
      }
      return true;
    lambda: |-
      return data[item->offset] << 8 | data[item->offset + 1];

  # Rejestr 43 – Urlop (zapis 43 → weryfikacja reg.35)
  # ON=30 (max 30 dni) / OFF=0
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Urlop"
    register_type: holding
    address: 43
    write_lambda: |-
      if (x) {
        payload = {0x00, 0x1E};  // ON: 30 dni (0x1E = 30)
      } else {
        payload = {0x00, 0x00};  // OFF
      }
      return true;
    lambda: |-
      return data[item->offset] << 8 | data[item->offset + 1];

  # Rejestr 44 – Kominek (zapis 44 → weryfikacja reg.44)
  # ON=180 (180 sekund) / OFF=0
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Kominek"
    register_type: holding
    address: 44
    write_lambda: |-
      if (x) {
        payload = {0x00, 0xB4};  // ON: 180 sekund (0xB4 = 180)
      } else {
        payload = {0x00, 0x00};  // OFF
      }
      return true;
    lambda: |-
      return data[item->offset] << 8 | data[item->offset + 1];

  # Rejestr 45 – Impreza (zapis 45 → weryfikacja reg.45)
  # ON=720 (720 minut = 12h) / OFF=0
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Impreza"
    register_type: holding
    address: 45
    write_lambda: |-
      if (x) {
        payload = {0x02, 0xD0};  // ON: 720 minut (0x02D0 = 720)
      } else {
        payload = {0x00, 0x00};  // OFF
      }
      return true;
    lambda: |-
      return data[item->offset] << 8 | data[item->offset + 1];

  # Rejestr 62 – Przepustnica strefowa (zapis 62 → weryfikacja reg.70)
  # ON=1 / OFF=0
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Przepustnica strefowa"
    register_type: holding
    address: 62
    bitmask: 0x1


# ─── PROGRAM TYGODNIOWY – uwagi ───────────────────────────────────────────────
# Sposób działania:
#   1. Zapisz dzień tygodnia do rejestru 8 (select "Program - dzień tygodnia")
#   2. Odczyt/zapis stref (rejestry 10–23) dotyczy wybranego dnia
#   Skrypt HA wykonuje kroki 1→2 sekwencyjnie.
#
# Końce stref wyrażone w minutach od północy (skok 15 min):
#   Strefa 1: rejestr 10 (15–1380 min, domyślnie 300 = 5:00)
#   Strefa 2: rejestr 11 (30–1395 min, domyślnie 600 = 10:00)
#   Strefa 3: rejestr 12 (45–1410 min, domyślnie 900 = 15:00)
#   Strefa 4: rejestr 13 (60–1425 min, domyślnie 1200 = 20:00)
#   Strefa 5: biegnie do końca doby
#
# Bieg stref: rejestry 14–18 (0=Postój, 1=Tryb XF, 2=Praca, 3=Wietrzenie)
# Temperatura stref: rejestry 19–23 (10–30°C, domyślnie 20°C)
#
# Rejestry 50 (Data) i 51 (Godzina) są dostępne w Modbus (R/W),
# ale wymagają specjalnego formatu bitowego wg dokumentacji urządzenia.
# Zaleca się synchronizację czasu przez panel sterownika lub własny skrypt HA.
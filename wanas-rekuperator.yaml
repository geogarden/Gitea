# ─── SENSORY TEKSTOWE (bieg, błędy) ──────────────────────────────────────────
text_sensor:
  # Rejestr 2 – Bieg nawiewu
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Bieg nawiewu"
    register_type: holding
    address: 2
    raw_encode: NONE
    lambda: |-
      uint16_t val = data[item->offset] << 8 | data[item->offset + 1];
      switch (val) {
        case 0: return std::string("Postój");
        case 1: return std::string("Tryb XF");
        case 2: return std::string("Praca");
        case 3: return std::string("Wietrzenie");
        default: return std::string("Nieznany");
      }

  # Rejestr 3 – Bieg wywiewu
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Bieg wywiewu"
    register_type: holding
    address: 3
    raw_encode: NONE
    lambda: |-
      uint16_t val = data[item->offset] << 8 | data[item->offset + 1];
      switch (val) {
        case 0: return std::string("Postój");
        case 1: return std::string("Tryb XF");
        case 2: return std::string("Praca");
        case 3: return std::string("Wietrzenie");
        default: return std::string("Nieznany");
      }

  # Rejestr 37 – Błędy (raw binarny)
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Błędy (raw)"
    register_type: holding
    address: 37
    raw_encode: HEXBYTES



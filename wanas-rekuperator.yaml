# ─── UART / Modbus ────────────────────────────────────────────────────────────
# Podłączenie RS-485:
#   GPIO16 (RX) → A (DATA+) konwertera RS-485
#   GPIO17 (TX) → B (DATA-) konwertera RS-485
#   GPIO4       → DE/RE (kierunek transmisji) konwertera RS-485
uart:
  id: modbus_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 19200   # Domyślna prędkość wg rejestru 25 (wartość 3 = 19200)
  parity: EVEN       # Domyślny parametr wg rejestru 26 (wartość 1 = E-8-1)
  stop_bits: 1
  data_bits: 8

modbus:
  id: modbus_bus
  uart_id: modbus_uart
  flow_control_pin: GPIO4

modbus_controller:
  - id: wanas
    address: ${modbus_address}
    modbus_id: modbus_bus
    setup_priority: -10
    update_interval: 10s   # Odświeżanie co 10 sekund


# ─── SENSORY (tylko odczyt) ───────────────────────────────────────────────────
sensor:
  # Rejestr 0 – Wydatek nawiewu [m³/h]
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Wydatek nawiewu"
    register_type: holding
    address: 0
    unit_of_measurement: "m³/h"
    device_class: volume_flow_rate
    state_class: measurement
    accuracy_decimals: 0

  # Rejestr 1 – Wydatek wywiewu [m³/h]
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Wydatek wywiewu"
    register_type: holding

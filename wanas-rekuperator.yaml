  # Rejestr 4 – Temperatura zewnętrzna
  - platform: modbus_controller
    modbus_controller_id: wanas
    name: "Temperatura zewnętrzna"
    register_type: holding
    address: 4
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: |-
          if (x == 63066) return NAN;  // Błąd czujnika
          if (x > 32767) return (x - 65536) / 10.0;
          return x / 10.0;

  # Rejestr 5 – Temperatura wyrzutowa
